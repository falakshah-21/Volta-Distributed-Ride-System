<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volta.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Volta.Client.styles.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
</head>

<body>
    <div id="app">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; font-family: sans-serif;">
            <div style="border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <h2 style="color: #2c3e50;">Starting Volta...</h2>
            <p style="color: #7f8c8d;">Please wait while we connect to the network.</p>
        </div>
        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </div>

    <div id="blazor-error-ui" style="display: none;"></div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <script>
        window.voltaMap = {
            map: null,
            pickMarker: null,
            dropMarker: null,
            routeLayer: null,
            dotNetRef: null,

            initMap: function (elementId, dotNetReference) {
                // Safety check
                if (typeof L === 'undefined') {
                    console.error("Leaflet is STILL missing. Check internet connection.");
                    return;
                }

                this.dotNetRef = dotNetReference;

                if (this.map) return;

                this.map = L.map(elementId).setView([24.8607, 67.0011], 13);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(this.map);

                this.map.on('click', async function (e) {
                    const lat = e.latlng.lat;
                    const lng = e.latlng.lng;

                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                        const data = await response.json();
                        const address = data.display_name ? data.display_name.split(',')[0] : "Selected Location";

                        dotNetReference.invokeMethodAsync('OnMapClicked', lat, lng, address);
                    } catch (err) {
                        console.error("Geocoding failed:", err);
                    }
                });

                setTimeout(() => { this.map.invalidateSize(); }, 500);
            },

            addMarker: function (lat, lng, isPickup) {
                if (!this.map) return;

                if (isPickup) {
                    if (this.pickMarker) this.map.removeLayer(this.pickMarker);
                    this.pickMarker = L.marker([lat, lng]).addTo(this.map)
                        .bindPopup("Pickup").openPopup();
                } else {
                    if (this.dropMarker) this.map.removeLayer(this.dropMarker);
                    this.dropMarker = L.marker([lat, lng]).addTo(this.map)
                        .bindPopup("Dropoff").openPopup();
                }
                this.map.setView([lat, lng], 14);
            },

            searchLocation: async function (query, isPickup) {
                if (!this.map) return null;

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}+Karachi`);
                    const data = await response.json();

                    if (data && data.length > 0) {
                        const lat = data[0].lat;
                        const lng = data[0].lon;

                        this.addMarker(lat, lng, isPickup);
                        return `${lat},${lng}`;
                    }
                } catch (e) {
                    console.error("Search failed", e);
                }
                return null;
            },

            calculateRoute: async function (pickLat, pickLng, dropLat, dropLng) {
                if (!this.map) return null;

                if (this.routeLayer) this.map.removeLayer(this.routeLayer);

                const url = `https://router.project-osrm.org/route/v1/driving/${pickLng},${pickLat};${dropLng},${dropLat}?overview=full&geometries=geojson`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.routes && data.routes.length > 0) {
                        const route = data.routes[0];
                        const coordinates = route.geometry.coordinates.map(c => [c[1], c[0]]);

                        this.routeLayer = L.polyline(coordinates, { color: 'blue', weight: 5 }).addTo(this.map);
                        this.map.fitBounds(this.routeLayer.getBounds());

                        const minutes = Math.round(route.duration / 60);
                        const km = (route.distance / 1000).toFixed(1);

                        return `${minutes} mins|${km} km`;
                    }
                } catch (e) {
                    console.error("Routing failed", e);
                }
                return null;
            }
        };
    </script>
</body>
</html>
